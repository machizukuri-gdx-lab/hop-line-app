version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hop-line-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    env_file:
      - ./frontend/.env.local
    depends_on:
      emulator:
        condition: service_healthy
    networks:
      - hop-network

  emulator:
    build:
      context: .
      dockerfile: functions/Dockerfile
    container_name: hop-line-emulator
    working_dir: /app
    ports:
      - "4000:4000"
      - "5001:5001"
      - "8080:8080"
      - "9099:9099"
    volumes:
      - .:/app
      - functions_node_modules:/app/functions/node_modules
      - firebase_emulator_cache:/root/.cache/firebase/emulators
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    networks:
      - hop-network

networks:
  hop-network:
    driver: bridge

volumes:
  frontend_node_modules:
  functions_node_modules:
  firebase_emulator_cache:
